<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas Bon POS Pro v7 - BIONE SELL</title>
    
    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Babel (Untuk membaca JSX di dalam Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 4. Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Sembunyikan scrollbar tapi tetap bisa di-scroll */
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-amber-500 selection:text-slate-950 print:bg-white print:text-slate-950">

    <!-- Container Utama React -->
    <div id="root"></div>

    <!-- LOGIKA APLIKASI (JSX) -->
    <script type="text/babel">
        // Destrukturisasi React Hooks dari global window.React
        const { useState, useEffect, useMemo, useRef } = React;

        // --- KOMPONEN IKON KUSTOM ---
        // Menggantikan fungsi import { IconName } dari 'lucide-react'
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconData = window.lucide.icons[name];
            if (!iconData) return null;
            const svgString = iconData.toSvg({ width: size, height: size });
            return <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: svgString }} />;
        };

        // --- DATA AWAL (SEEDERS) ---
        const INITIAL_PRODUCTS = [
            { id: 'p1', name: 'Beras Premium Cianjur', price: 16000, unit: 'KG' },
            { id: 'p2', name: 'Minyak Goreng Sawit 1L', price: 21000, unit: 'Liter' },
            { id: 'p3', name: 'Gula Pasir Kristal', price: 17000, unit: 'KG' },
            { id: 'p4', name: 'Telur Ayam Negeri', price: 28000, unit: 'KG' }
        ];

        const INITIAL_CUSTOMERS = [
            { id: 'c1', name: 'Budi Santoso', phone: '081234567890', address: 'Jl. Merdeka' }
        ];

        const INITIAL_TRANSACTIONS = [];

        const INITIAL_SHOP_CONFIG = {
            name: 'WARUNG KITA PRO V7',
            owner: 'Kasir',
            address: 'Jl. Jenderal Sudirman No. 45',
            whatsapp: '081234567890',
            logo: '',
            colorTheme: 'navy-gold'
        };

        const DEFAULT_WA_TEMPLATES = [
            {
                id: 't-1',
                name: 'Pengingat Santun Jatuh Tempo',
                content: "Halo {nama},\nIni pengingat dari {toko} bahwa Anda memiliki tagihan belanja sebesar {total} dengan jatuh tempo {tanggal_jatuh_tempo}.\nDetail Belanja: {detail_bon}.\nMohon kesediaannya untuk segera melakukan pelunasan. Terima kasih banyak 🙏."
            }
        ];

        const AVAILABLE_UNITS = ['PCS', 'KG', 'Gram', 'Liter', 'Box', 'Pack', 'Meter', 'Botol', 'Sachet'];

        // --- FUNGSI BANTU FORMAT UANG & TANGGAL ---
        const formatIDR = (val) => {
            const num = Number(val) || 0;
            return new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0
            }).format(num);
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) { return dateStr; }
        };

        // ==========================================
        // ALGORITHMIC DYNAMIC LICENSE VALIDATOR
        // ==========================================
        const TRIAL_DAYS = 7;

        const validateLicenseKey = (key) => {
            if (!key || typeof key !== 'string') return false;
            const cleanKey = key.trim().toUpperCase();
            const parts = cleanKey.split('-');
            
            // Format wajib: BIONE - XXXX - YYYY
            if (parts.length !== 3 || parts[0] !== 'BIONE' || parts[1].length !== 4 || parts[2].length !== 4) return false;

            const base = parts[1];
            const expectedSig = parts[2];
            const salt = "ROBI2026"; // Secret Salt Maker
            let actualSig = "";

            for (let i = 0; i < base.length; i++) {
                const charCode = base.charCodeAt(i);
                const saltCode = salt.charCodeAt(i % salt.length);
                const mixed = (charCode + saltCode + i) % 36;
                actualSig += mixed < 10 ? String.fromCharCode(48 + mixed) : String.fromCharCode(55 + mixed);
            }

            return actualSig === expectedSig;
        };

        // --- KOMPONEN APLIKASI UTAMA ---
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [subTabBukuKas, setSubTabBukuKas] = useState('daftar'); 
            
            // --- LICENSE & TRIAL STATE ---
            const [installDate, setInstallDate] = useState(() => {
                let date = localStorage.getItem('kbp_install_date_v7');
                if (!date) {
                    date = new Date().toISOString();
                    localStorage.setItem('kbp_install_date_v7', date);
                }
                return date;
            });

            const [licenseKey, setLicenseKey] = useState(() => {
                return localStorage.getItem('kbp_license_key_v7') || '';
            });

            const [licenseInput, setLicenseInput] = useState('');

            // Hitung sisa hari trial
            const msPerDay = 24 * 60 * 60 * 1000;
            const daysUsed = Math.floor((new Date() - new Date(installDate)) / msPerDay);
            const trialDaysLeft = Math.max(0, TRIAL_DAYS - daysUsed);
            
            const isLicensed = validateLicenseKey(licenseKey);
            const isLocked = !isLicensed && trialDaysLeft <= 0;
            const isTrial = !isLicensed && trialDaysLeft > 0;

            // --- STORAGE CORE STATES ---
            const [products, setProducts] = useState(() => { const local = localStorage.getItem('kbp_products_v7'); return local ? JSON.parse(local) : INITIAL_PRODUCTS; });
            const [customers, setCustomers] = useState(() => { const local = localStorage.getItem('kbp_customers_v7'); return local ? JSON.parse(local) : INITIAL_CUSTOMERS; });
            const [transactions, setTransactions] = useState(() => { const local = localStorage.getItem('kbp_transactions_v7'); return local ? JSON.parse(local) : INITIAL_TRANSACTIONS; });
            const [shopConfig, setShopConfig] = useState(() => { const local = localStorage.getItem('kbp_shop_config_v7'); return local ? JSON.parse(local) : INITIAL_SHOP_CONFIG; });
            const [waTemplates, setWaTemplates] = useState(() => { const local = localStorage.getItem('kbp_wa_templates_v7'); return local ? JSON.parse(local) : DEFAULT_WA_TEMPLATES; });
            const [activeTemplateId, setActiveTemplateId] = useState(() => { return localStorage.getItem('kbp_active_template_id_v7') || 't-1'; });

            // --- POS STATES ---
            const [cart, setCart] = useState([]);
            const [selectedCustomerId, setSelectedCustomerId] = useState('');
            const [cashMethod, setCashMethod] = useState('Tunai'); 
            const [cashPaidInput, setCashPaidInput] = useState(''); 
            const [dueDaysSelection, setDueDaysSelection] = useState('7'); 
            const [customDueDays, setCustomDueDays] = useState('15');
            const [posDueDate, setPosDueDate] = useState(() => { const d = new Date(); d.setDate(d.getDate() + 7); return d.toISOString().slice(0, 10); });
            
            const [ppnPercent, setPpnPercent] = useState(0);
            const [discountType, setDiscountType] = useState('nominal');
            const [discountInput, setDiscountInput] = useState(0);
            const [potongan, setPotongan] = useState(0);
            const [trxDate, setTrxDate] = useState(() => { const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); return now.toISOString().slice(0, 16); });
            
            const [posSearchQuery, setPosSearchQuery] = useState('');
            const [customerSearchQuery, setCustomerSearchQuery] = useState('');
            const [productSearchQuery, setProductSearchQuery] = useState('');
            const [txFilterRange, setTxFilterRange] = useState('all'); 
            const [filterStartDate, setFilterStartDate] = useState('');
            const [filterEndDate, setFilterEndDate] = useState('');
            const [debtFilterStatus, setDebtFilterStatus] = useState('all');
            
            const [calendarYear, setCalendarYear] = useState(new Date().getFullYear());
            const [calendarMonth, setCalendarMonth] = useState(new Date().getMonth());
            const [selectedCalendarDay, setSelectedCalendarDay] = useState(null);

            const [customConfirmModal, setCustomConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
            const [activeReceipt, setActiveReceipt] = useState(null); 
            const [isNewProductModalOpen, setIsNewProductModalOpen] = useState(false);
            const [isNewCustomerModalOpen, setIsNewCustomerModalOpen] = useState(false);
            const [isPayDebtModalOpen, setIsPayDebtModalOpen] = useState(false);
            const [debtPaymentTarget, setDebtPaymentTarget] = useState(null); 
            const [debtPaymentAmount, setDebtPaymentAmount] = useState('');
            const [debtPaymentMethod, setDebtPaymentMethod] = useState('Tunai');
            const [debtPaymentDate, setDebtPaymentDate] = useState(() => { const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); return now.toISOString().slice(0, 16); });
            const [toast, setToast] = useState(null);
            const [expandedCustomerId, setExpandedCustomerId] = useState(null);

            const [newProduct, setNewProduct] = useState({ name: '', price: '', unit: 'PCS' });
            const [editingProduct, setEditingProduct] = useState(null);
            const [newCustomer, setNewCustomer] = useState({ name: '', phone: '', address: '' });
            const [editingCustomer, setEditingCustomer] = useState(null);
            const [editingTemplate, setEditingTemplate] = useState(null);
            const [newTemplate, setNewTemplate] = useState({ name: '', content: '' });
            const [isNewTemplateModalOpen, setIsNewTemplateModalOpen] = useState(false);

            const [pairedPrinter, setPairedPrinter] = useState(null);
            const [printerDevice, setPrinterDevice] = useState(null);
            const [printerCharacteristic, setPrinterCharacteristic] = useState(null);
            const [printerLogs, setPrinterLogs] = useState([]);
            const [isPrinterConnecting, setIsPrinterConnecting] = useState(false);

            // --- LOCALSTORAGE SYNC ---
            useEffect(() => { localStorage.setItem('kbp_products_v7', JSON.stringify(products)); }, [products]);
            useEffect(() => { localStorage.setItem('kbp_customers_v7', JSON.stringify(customers)); }, [customers]);
            useEffect(() => { localStorage.setItem('kbp_transactions_v7', JSON.stringify(transactions)); }, [transactions]);
            useEffect(() => { localStorage.setItem('kbp_shop_config_v7', JSON.stringify(shopConfig)); }, [shopConfig]);
            useEffect(() => { localStorage.setItem('kbp_wa_templates_v7', JSON.stringify(waTemplates)); }, [waTemplates]);
            useEffect(() => { localStorage.setItem('kbp_active_template_id_v7', activeTemplateId); }, [activeTemplateId]);
            useEffect(() => { localStorage.setItem('kbp_license_key_v7', licenseKey); }, [licenseKey]);

            const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3500); };
            const triggerConfirm = (title, message, onConfirm) => { setCustomConfirmModal({ isOpen: true, title, message, onConfirm: () => { onConfirm(); setCustomConfirmModal(prev => ({ ...prev, isOpen: false })); } }); };

            // --- LICENSE ACTIVATION HANDLER ---
            const handleActivateLicense = (e) => {
                e.preventDefault();
                const inputKey = licenseInput.trim().toUpperCase();
                if (validateLicenseKey(inputKey)) {
                    setLicenseKey(inputKey);
                    showToast('Lisensi Permanen Berhasil Diaktifkan!', 'success');
                    setLicenseInput('');
                } else {
                    showToast('Kode Lisensi Tidak Valid/Salah!', 'error');
                }
            };

            // --- EXPORT & IMPORT DATA SYSTEM ---
            const handleExportData = () => {
                const dataStr = JSON.stringify({ products, customers, transactions, shopConfig, waTemplates }, null, 2);
                const link = document.createElement('a'); link.href = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                link.download = `BACKUP_KASBON_${new Date().toISOString().slice(0,10)}.json`; link.click(); showToast('Backup diunduh!');
            };

            const handleImportData = (e) => {
                const fileReader = new FileReader();
                if (e.target.files.length === 0) return;
                fileReader.readAsText(e.target.files[0], "UTF-8");
                fileReader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed.products && parsed.customers && parsed.transactions && parsed.shopConfig) {
                            setProducts(parsed.products);
                            setCustomers(parsed.customers);
                            setTransactions(parsed.transactions);
                            setShopConfig(parsed.shopConfig);
                            if (parsed.waTemplates) setWaTemplates(parsed.waTemplates);
                            showToast('Data berhasil dipulihkan!');
                        } else {
                            showToast('Format file backup tidak valid!', 'error');
                        }
                    } catch (err) {
                        showToast('Gagal memproses file cadangan!', 'error');
                    }
                };
            };

            const handleExportCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,ID Transaksi,Tanggal,Jatuh Tempo,Pelanggan,Metode Bayar,Subtotal,PPN,Diskon,Potongan,Total Akhir,Terbayar,Sisa Tagihan,Status\n";
                transactions.forEach(tx => {
                    const row = [
                        tx.id, tx.date.slice(0, 10), tx.dueDate || '-', tx.customerName, tx.paymentMethod,
                        tx.subtotal, tx.ppnAmount, tx.discountAmount, tx.potongan, tx.total,
                        tx.cashPaid, tx.bonAmount, tx.status
                    ].join(",");
                    csvContent += row + "\n";
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `LAPORAN_KASBON_PRO_V7.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('Laporan penjualan CSV diunduh!');
            };


            // --- LOCK SCREEN UI ---
            if (isLocked) {
                return (
                    <div className="flex flex-col items-center justify-center p-4">
                        <div className="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl relative overflow-hidden mt-10">
                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-rose-500 to-amber-500"></div>
                            <div className="text-center space-y-4 mb-8">
                                <div className="w-20 h-20 bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-500/20">
                                    <Icon name="lock" size={40} />
                                </div>
                                <h1 className="text-2xl font-black tracking-tight text-white">Masa Trial Habis</h1>
                                <p className="text-sm text-slate-400 leading-relaxed">
                                    Masa percobaan 7 hari Anda untuk aplikasi <strong>Kas Bon POS Pro v7</strong> telah berakhir. Semua data Anda aman, silakan aktivasi lisensi untuk melanjutkan.
                                </p>
                            </div>
                            <form onSubmit={handleActivateLicense} className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-slate-400 block mb-2 uppercase tracking-wider">Masukkan Kode Lisensi</label>
                                    <div className="relative">
                                        <Icon name="key" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" size={18} />
                                        <input 
                                            type="text" 
                                            value={licenseInput}
                                            onChange={(e) => setLicenseInput(e.target.value)}
                                            placeholder="Ketik kode aktivasi..."
                                            className="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 pl-11 pr-4 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-amber-500 font-mono text-center tracking-widest uppercase"
                                            required
                                        />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-3.5 rounded-xl transition-all shadow-lg shadow-amber-500/20 active:scale-95 flex justify-center items-center gap-2">
                                    Buka Kunci Aplikasi <Icon name="arrow-right" size={18} />
                                </button>
                            </form>
                            <div className="mt-8 pt-6 border-t border-slate-800/60 text-center">
                                <p className="text-xs text-slate-500">
                                    Hubungi pengembang <strong className="text-amber-400">BIONE SELL</strong> untuk pembelian lisensi permanen.
                                </p>
                            </div>
                        </div>

                        {toast && (
                            <div className="fixed top-5 right-5 z-50 flex items-center gap-3 bg-slate-900 border border-rose-500/40 text-slate-100 px-5 py-4 rounded-xl shadow-2xl animate-bounce">
                                <Icon name="alert-triangle" className="text-rose-400" size={20} />
                                <span className="font-semibold text-sm">{toast.message}</span>
                            </div>
                        )}
                    </div>
                );
            }

            // --- SAFE DYNAMIC DUE DATE ---
            useEffect(() => {
                if (dueDaysSelection !== 'custom') {
                    const days = parseInt(dueDaysSelection, 10);
                    const d = new Date(); d.setDate(d.getDate() + days);
                    setPosDueDate(d.toISOString().slice(0, 10));
                } else {
                    const days = parseInt(customDueDays, 10) || 7;
                    const d = new Date(); d.setDate(d.getDate() + days);
                    setPosDueDate(d.toISOString().slice(0, 10));
                }
            }, [dueDaysSelection, customDueDays]);

            const addPrinterLog = (msg) => { setPrinterLogs(prev => [`[${new Date().toLocaleTimeString()}] ${msg}`, ...prev.slice(0, 15)]); };

            const handlePairPrinter = async () => {
                if (!navigator.bluetooth) {
                    showToast('Browser ini tidak mendukung Web Bluetooth. Gunakan Chrome di Android/PC!', 'error');
                    addPrinterLog('Bluetooth API tidak terdeteksi di browser ini.'); return;
                }
                setIsPrinterConnecting(true); addPrinterLog('Memulai pencarian printer bluetooth...');
                try {
                    const device = await navigator.bluetooth.requestDevice({
                        filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }, { namePrefix: 'Printer' }, { namePrefix: 'MTP' }, { namePrefix: 'RPP' }, { namePrefix: 'PT' }],
                        optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', '0000ff00-0000-1000-8000-00805f9b34fb', '00001101-0000-1000-8000-00805f9b34fb']
                    });
                    const server = await device.gatt.connect();
                    const services = await server.getPrimaryServices();
                    let selectedCharacteristic = null;
                    for (const service of services) {
                        const characteristics = await service.getCharacteristics();
                        for (const char of characteristics) {
                            if (char.properties.write || char.properties.writeWithoutResponse) { selectedCharacteristic = char; break; }
                        }
                        if (selectedCharacteristic) break;
                    }
                    if (!selectedCharacteristic) throw new Error('Karakteristik penulisan data printer tidak ditemukan.');
                    setPrinterDevice(device); setPrinterCharacteristic(selectedCharacteristic); setPairedPrinter(device.name);
                    showToast(`Printer ${device.name} Berhasil Terhubung!`, 'success');
                    device.addEventListener('gattserverdisconnected', () => { setPairedPrinter(null); setPrinterCharacteristic(null); });
                } catch (error) {
                    if (error.name === 'SecurityError') showToast('Akses Bluetooth Ditolak! Silakan gunakan Print PDF.', 'error');
                    else showToast(`Gagal pairing: ${error.message}`, 'error');
                } finally { setIsPrinterConnecting(false); }
            };

            const handleDisconnectPrinter = () => {
                if (printerDevice && printerDevice.gatt.connected) printerDevice.gatt.disconnect();
                setPrinterDevice(null); setPrinterCharacteristic(null); setPairedPrinter(null);
                showToast('Koneksi printer diputuskan.', 'info');
            };

            const triggerPrintReceipt = () => { window.print(); };

            const encoder = new window.TextEncoder();
            const sendRawToPrinter = async (text) => {
                if (!printerCharacteristic) return false;
                try {
                    const bytes = encoder.encode(text);
                    for (let i = 0; i < bytes.length; i += 20) await printerCharacteristic.writeValue(bytes.slice(i, i + 20));
                    return true;
                } catch (err) { return false; }
            };

            const handleTestPrint = async () => {
                const testText = "\x1b\x61\x01\x1b\x45\x01KAS BON POS PRO\n" + shopConfig.name + "\n\x1b\x45\x00Sinyal Printer Terkoneksi Sempurna!\n\n\n\n";
                const success = await sendRawToPrinter(testText);
                if (success) showToast('Cetak sinyal test berhasil dikirim!', 'success');
                else showToast('Koneksi printer fisik tidak aktif. Fallback cetak virtual dilakukan.', 'info');
            };

            const formatThermalLine = (left, right) => {
                const spaceCount = 32 - left.length - right.length;
                if (spaceCount <= 0) return left.substring(0, 32 - right.length - 1) + ' ' + right;
                return left + ' '.repeat(spaceCount) + right;
            };

            const handlePrintEscPos = async (tx) => {
                if (!tx) return;
                let escTxt = "\x1b\x61\x01\x1b\x45\x01" + `${shopConfig.name}\n` + "\x1b\x45\x00" + `${shopConfig.address}\nWA: ${shopConfig.whatsapp}\n` + "-".repeat(32) + "\n\x1b\x61\x00"; 
                escTxt += `Nota : ${tx.id}\nTgl  : ${formatDate(tx.date).slice(0, 16)}\n` + (tx.dueDate ? `Jatuh Tempo: ${tx.dueDate}\n` : '') + `Plg  : ${tx.customerName}\n` + "-".repeat(32) + "\n";
                tx.items.forEach(item => {
                    escTxt += `${item.name}\n` + formatThermalLine(`  ${item.qty} ${item.unit} x ${item.price.toLocaleString('id-ID')}`, (item.price * item.qty).toLocaleString('id-ID')) + "\n";
                });
                escTxt += "-".repeat(32) + "\n" + formatThermalLine("Subtotal:", tx.subtotal.toLocaleString('id-ID')) + "\n";
                if (tx.ppnAmount > 0) escTxt += formatThermalLine(`PPN (${tx.ppnPercent}%):`, `+${tx.ppnAmount.toLocaleString('id-ID')}`) + "\n";
                if (tx.discountAmount > 0) escTxt += formatThermalLine("Diskon:", `-${tx.discountAmount.toLocaleString('id-ID')}`) + "\n";
                if (tx.potongan > 0) escTxt += formatThermalLine("Potongan:", `-${tx.potongan.toLocaleString('id-ID')}`) + "\n";
                escTxt += "\x1b\x45\x01" + formatThermalLine("TOTAL AKHIR:", tx.total.toLocaleString('id-ID')) + "\n\x1b\x45\x00"; 
                escTxt += formatThermalLine("Cash Dibayar:", tx.cashPaid.toLocaleString('id-ID')) + "\n";
                if (tx.bonAmount > 0) escTxt += formatThermalLine("Sisa Bon (Utang):", tx.bonAmount.toLocaleString('id-ID')) + "\n";
                if (tx.changeAmount > 0) escTxt += formatThermalLine("Kembalian:", tx.changeAmount.toLocaleString('id-ID')) + "\n";
                escTxt += formatThermalLine("Status Pembayaran:", tx.status.toUpperCase()) + "\n" + "-".repeat(32) + "\n\x1b\x61\x01Terima Kasih Atas Kunjungan Anda\nKas Bon POS Pro v7\n\n\n\n";
                
                const success = await sendRawToPrinter(escTxt);
                if (success) showToast('Cetak struk thermal berhasil!', 'success');
                else window.print(); 
            };

            const parseWaTemplate = (templateContent, customerName, shopName, totalAmount, dueDate, itemsList) => {
                if (!templateContent) return '';
                return templateContent.replace(/{nama}/gi, customerName || 'Pelanggan').replace(/{toko}/gi, shopName || 'Toko Kami').replace(/{total}/gi, formatIDR(totalAmount)).replace(/{tanggal_jatuh_tempo}/gi, dueDate ? dueDate : 'Segera').replace(/{detail_bon}/gi, itemsList || '-');
            };

            const currentTemplate = useMemo(() => { return waTemplates.find(t => t.id === activeTemplateId) || waTemplates[0] || DEFAULT_WA_TEMPLATES[0]; }, [waTemplates, activeTemplateId]);

            const sendWhatsAppReminder = (name, phone, amount, dueDate = '', detailText = '') => {
                if (!phone) { showToast('Nomor WhatsApp pelanggan tidak diset!', 'error'); return; }
                const rawMsg = parseWaTemplate(currentTemplate.content, name, shopConfig.name, amount, dueDate || 'Segera', detailText || 'Kewajiban belanja Kas Bon');

                                            </div>
                                        ))}
                                        <span className="block border-b border-dashed border-slate-400 my-2"></span>
                                    </div>
                                    <div className="space-y-1 text-right">
                                        <div className="flex justify-between text-slate-600"><span>Subtotal:</span><span>{formatIDR(activeReceipt.subtotal)}</span></div>
                                        <div className="flex justify-between font-bold text-xs pt-1 border-t border-dashed border-slate-300"><span>TOTAL AKHIR:</span><span>{formatIDR(activeReceipt.total)}</span></div>
                                        <div className="flex justify-between text-slate-600"><span>Cash Dibayar:</span><span>{formatIDR(activeReceipt.cashPaid)}</span></div>
                                        {activeReceipt.bonAmount > 0 && <div className="flex justify-between font-bold text-rose-600 text-xs"><span>Sisa Bon:</span><span>{formatIDR(activeReceipt.bonAmount)}</span></div>}
                                    </div>
                                </div>
                                <div className="flex flex-col gap-2 pt-2 print:hidden text-xs">
                                    <div className="flex gap-2">
                                        <button onClick={() => handlePrintEscPos(activeReceipt)} className="flex-1 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-2.5 rounded-xl"><Icon name="printer" size={14} className="inline"/> Print Thermal</button>
                                        <button onClick={() => handleShareReceiptImage(activeReceipt)} className="px-4 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black py-2.5 rounded-xl"><Icon name="share-2" size={14} className="inline"/> Share PNG</button>
                                    </div>
                                    <button onClick={triggerPrintReceipt} className="w-full bg-slate-800 text-slate-300 py-2 rounded-lg">Simpan PDF</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL BAYAR UTANG */}
                    {isPayDebtModalOpen && debtPaymentTarget && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 max-w-sm w-full space-y-4">
                                <div className="flex justify-between items-center pb-2 border-b border-slate-800"><h4 className="font-bold text-sm text-slate-200">Cicil Pembayaran Nota</h4><button onClick={() => setIsPayDebtModalOpen(false)} className="text-slate-400"><Icon name="x" size={16} /></button></div>
                                <div className="space-y-3 text-xs">
                                    <div><label className="text-slate-400 block mb-1">Tanggal Pembayaran</label><input type="datetime-local" value={debtPaymentDate} onChange={(e) => setDebtPaymentDate(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-100 focus:outline-none" required /></div>
                                    <div><label className="text-slate-400 block mb-1">Nominal Cicilan (Rp)</label><input type="number" value={debtPaymentAmount} onChange={(e) => setDebtPaymentAmount(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-100 focus:outline-none" /></div>
                                    <button onClick={handlePayDebtSpecific} className="w-full bg-emerald-500 text-slate-950 font-bold py-2.5 rounded-lg">Simpan</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- RENDER REACT KE DOM ---
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);

    </script>
</body>
</html>
